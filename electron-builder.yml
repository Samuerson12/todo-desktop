appId: com.acme.todoapp
productName: Todo Desktop
copyright: "Copyright 2026"

directories:
  output: dist-packages

files:
  - out/**/*
  - package.json

# macOS specific settings
mac:
  icon: resources/icon.png
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

# DMG specific settings (Move this OUT of the mac block)
dmg:
  window:
    width: 540
    height: 380