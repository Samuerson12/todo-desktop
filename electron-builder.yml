appId: com.acme.todoapp
productName: Todo Desktop
copyright: "Copyright 2026"

directories:
  output: dist-packages

files:
  - out/**/*
  - package.json

# Windows
win:
  icon: resources/icon.png
  target:
    - target: nsis # produces a .exe setup wizard
      arch: [x64]
    - target: msi # produces an enterprise .msi
      arch: [x64]

nsis:
  oneClick: false # show the install wizard
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Todo Desktop"
msi:
  oneClick: false
  perMachine: false # install per-user, no admin required

# macOS specific settings
mac:
  icon: resources/icon.png
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

# DMG specific settings (Move this OUT of the mac block)
dmg:
  window:
    width: 540
    height: 380